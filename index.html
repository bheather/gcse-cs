<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR CS Revision Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #EAF3DE; --green-dark: #27500A; --green-border: #3B6D11;
    --red-light: #FCEBEB; --red-dark: #501313; --red-border: #A32D2D;
    --amber-light: #FAEEDA; --amber-dark: #412402; --amber-border: #854F0B;
    --gray-bg: #F5F5F3; --gray-surface: #FFFFFF; --gray-border: #E0DED8;
    --text: #1a1a1a; --text-muted: #6b6b6b; --text-hint: #9b9b9b;
    --radius: 10px; --radius-lg: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .container { width: 100%; max-width: 640px; }

  /* Password screen */
  #lock-screen { text-align: center; }
  .lock-card { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; }
  .lock-icon { font-size: 40px; margin-bottom: 1rem; }
  .lock-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .lock-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .pw-input { width: 100%; padding: 12px 16px; border: 1px solid var(--gray-border); border-radius: var(--radius); font-size: 16px; margin-bottom: 0.75rem; outline: none; }
  .pw-input:focus { border-color: var(--green); }
  .pw-error { font-size: 13px; color: var(--red-border); margin-bottom: 0.75rem; display: none; }

  /* Shared button styles */
  .btn { width: 100%; padding: 12px 16px; border-radius: var(--radius); border: none; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--gray-border); margin-top: 8px; }
  .btn-secondary:hover { background: var(--gray-bg); }

  /* Quiz shell */
  #quiz-screen { display: none; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .app-title { font-size: 16px; font-weight: 600; }
  .streak-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--gray-border); color: var(--text-muted); background: var(--gray-surface); }
  .topic-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .topic-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gray-border); background: var(--gray-surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .topic-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
  .progress-bar { height: 6px; background: var(--gray-border); border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  /* Question */
  .question-card { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .q-meta { font-size: 12px; color: var(--text-hint); margin-bottom: 0.5rem; }
  .q-text { font-size: 16px; line-height: 1.6; }
  .attempts-row { display: flex; gap: 6px; align-items: center; margin-bottom: 0.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.on { background: var(--green); }
  .dot.off { background: var(--red-border); }
  .dot.empty { background: var(--gray-border); }
  .attempts-label { font-size: 12px; color: var(--text-hint); }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .option-btn { text-align: left; padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--gray-border); background: var(--gray-surface); color: var(--text); cursor: pointer; font-size: 15px; line-height: 1.5; transition: all 0.15s; }
  .option-btn:hover:not(:disabled) { background: var(--gray-bg); border-color: #aaa; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: var(--green-light); border-color: var(--green-border); color: var(--green-dark); }
  .option-btn.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-dark); }
  .option-btn.wrong-first { background: var(--amber-light); border-color: var(--amber-border); color: var(--amber-dark); }
  .option-btn.reveal { background: var(--green-light); border-color: var(--green-border); color: var(--green-dark); }

  /* Feedback */
  .feedback-box { border-radius: var(--radius); padding: 12px 16px; font-size: 14px; line-height: 1.6; margin-bottom: 0.75rem; }
  .feedback-box.try-again { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--amber-border); }
  .feedback-box.correct { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-border); }
  .feedback-box.wrong { background: var(--red-light); color: var(--red-dark); border: 1px solid var(--red-border); }
  .hook-box { background: var(--gray-bg); border: 1px solid var(--gray-border); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 1rem; }
  .hook-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-hint); margin-bottom: 4px; }

  /* Score screen */
  .score-card { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; margin-bottom: 1rem; }
  .score-big { font-size: 52px; font-weight: 600; color: var(--green); line-height: 1; margin: 0.75rem 0; }
  .score-msg { font-size: 15px; color: var(--text-muted); margin-top: 0.5rem; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .stat-box { flex: 1; background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius); padding: 0.75rem; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Loading */
  .loading { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 15px; }

  @media (max-width: 480px) {
    .score-big { font-size: 40px; }
    .lock-card { padding: 2rem 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Lock screen -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">📚</div>
      <h1>OCR CS Revision Quiz</h1>
      <p>Enter the password to start revising</p>
      <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
      <div class="pw-error" id="pw-error">Incorrect password — try again</div>
      <button class="btn btn-primary" onclick="checkPassword()">Unlock</button>
    </div>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen">

    <div class="top-bar">
      <span class="app-title">OCR GCSE CS Quiz</span>
      <span class="streak-badge" id="streak-badge">Streak: 0</span>
    </div>

    <div class="topic-row">
      <button class="topic-btn active" data-topic="both">Both papers</button>
      <button class="topic-btn" data-topic="J277/01">Paper 1 — Systems</button>
      <button class="topic-btn" data-topic="J277/02">Paper 2 — Programming</button>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

    <div id="quiz-area"></div>

  </div>
</div>

<script>
const PASSWORD = 'connorironclad';

const ALL_Q = [
  {paper:'p1',topic:'CPU Architecture',q:'What does the ALU in a CPU do?',options:['A. Stores the current instruction being executed','B. Performs arithmetic and logical operations','C. Controls the flow of data between CPU components','D. Holds the address of the next instruction'],answer:'B',explanation:'The Arithmetic Logic Unit carries out calculations (like addition) and logical comparisons (like greater than). It is the maths brain of the CPU.',memory_hook:'Think of the ALU as a calculator bolted inside the CPU — it does all the sums and yes/no decisions.'},
  {paper:'p1',topic:'CPU Architecture',q:'Which register holds the address of the next instruction to be fetched?',options:['A. Accumulator','B. Memory Data Register','C. Program Counter','D. Memory Address Register'],answer:'C',explanation:'The Program Counter keeps track of where the CPU is in the program by storing the address of the next instruction to fetch.',memory_hook:'The Program Counter is like a bookmark — it always points to the next page the CPU needs to read.'},
  {paper:'p1',topic:'CPU Architecture',q:'What is the correct order of the fetch-execute cycle?',options:['A. Execute, Fetch, Decode','B. Decode, Fetch, Execute','C. Fetch, Decode, Execute','D. Fetch, Execute, Decode'],answer:'C',explanation:'The CPU first fetches the instruction from memory, decodes it to understand what to do, then executes it. This repeats continuously.',memory_hook:'FDE — "Fetch Dinner Early". Fetch it, figure out what it is, then eat it.'},
  {paper:'p1',topic:'CPU Performance',q:'Which of the following would most directly increase CPU performance?',options:['A. Increasing RAM capacity','B. Increasing clock speed','C. Adding more storage','D. Using a larger monitor'],answer:'B',explanation:'Clock speed determines how many instruction cycles the CPU can complete per second. A higher clock speed means more instructions processed each second.',memory_hook:'Clock speed is like the tempo of a metronome — the faster it ticks, the more work the CPU does in the same time.'},
  {paper:'p1',topic:'CPU Performance',q:'How does increasing the number of CPU cores improve performance?',options:['A. It increases the clock speed of each core','B. It allows multiple tasks to be processed simultaneously','C. It increases the size of the cache','D. It reduces the amount of RAM needed'],answer:'B',explanation:'Multiple cores allow the CPU to handle several tasks or threads at the same time, improving overall performance for multitasking.',memory_hook:'Cores are like checkout lanes in a supermarket — more lanes means more customers served at the same time.'},
  {paper:'p1',topic:'Memory',q:'What is the main difference between RAM and ROM?',options:['A. RAM is permanent; ROM is temporary','B. RAM is volatile; ROM is non-volatile','C. RAM is slower than ROM','D. ROM can be written to freely; RAM cannot'],answer:'B',explanation:'RAM loses its contents when power is removed (volatile), while ROM retains data permanently without power (non-volatile).',memory_hook:'RAM is like a whiteboard — wipe it when the power goes. ROM is like text carved in stone — it stays forever.'},
  {paper:'p1',topic:'Memory',q:'What is cache memory used for?',options:['A. Long-term storage of files','B. Storing frequently used instructions close to the CPU for fast access','C. Running the operating system','D. Storing the BIOS'],answer:'B',explanation:'Cache is a small, very fast memory between the CPU and RAM that stores frequently accessed data so the CPU does not have to wait for slower RAM.',memory_hook:'Cache is like keeping your most-used pens on your desk rather than walking to a cupboard every time — it saves time.'},
  {paper:'p1',topic:'Storage',q:'Which type of storage uses magnetism to store data?',options:['A. SSD','B. USB flash drive','C. Hard disk drive','D. Optical disc'],answer:'C',explanation:'Hard disk drives (HDDs) store data by magnetising tiny areas on spinning platters. SSDs and USB drives use flash memory instead.',memory_hook:'An HDD is like a vinyl record player — spinning disc, read head moves across it — except it stores your files instead of music.'},
  {paper:'p1',topic:'Storage',q:'What is one advantage of an SSD over an HDD?',options:['A. SSDs are cheaper per gigabyte','B. SSDs have faster read and write speeds','C. SSDs can store more data','D. SSDs last longer in all conditions'],answer:'B',explanation:'SSDs have no moving parts and use flash memory, which allows much faster data access than the spinning platters and moving read heads of an HDD.',memory_hook:'SSD vs HDD — flash memory is instant like a camera flash; spinning disks have to physically spin to the right spot first.'},
  {paper:'p1',topic:'Networks',q:'What does a router do in a network?',options:['A. Converts digital signals to analogue','B. Directs data packets between networks','C. Connects devices within a single LAN using cables','D. Amplifies the wifi signal'],answer:'B',explanation:'A router directs packets of data between different networks, choosing the best path for the data to travel.',memory_hook:'A router is like a postman who reads addresses and decides which road each letter should go down.'},
  {paper:'p1',topic:'Networks',q:'Which network topology connects every device to a central switch or hub?',options:['A. Bus','B. Ring','C. Mesh','D. Star'],answer:'D',explanation:'In a star topology all devices connect to a central switch. If one cable fails, only that device is affected — the rest keep working.',memory_hook:'Draw it and it literally looks like a star — one centre point with lines radiating outward to each device.'},
  {paper:'p1',topic:'Networks',q:'What is the difference between a LAN and a WAN?',options:['A. LANs use wireless; WANs use cables','B. LANs cover a small area; WANs cover a large geographical area','C. LANs are faster than WANs in all cases','D. WANs are privately owned; LANs are public'],answer:'B',explanation:'A LAN (Local Area Network) covers a small area like a school or office. A WAN (Wide Area Network) spans large distances, like the internet.',memory_hook:'LAN = Local (your street). WAN = Wide (the whole world). Think of LAN as a village and WAN as the motorway connecting all villages.'},
  {paper:'p1',topic:'Network Protocols',q:'What is the purpose of HTTP?',options:['A. Sending emails between servers','B. Transferring web pages between a server and browser','C. Encrypting data during transmission','D. Assigning IP addresses to devices'],answer:'B',explanation:'HTTP (HyperText Transfer Protocol) defines how web browsers request pages and how web servers respond and send them back.',memory_hook:'HTTP is the language your browser uses to ask a website "can I have that page please?" — and the website replies with the content.'},
  {paper:'p1',topic:'Network Protocols',q:'What does DNS do?',options:['A. Encrypts data sent over a network','B. Translates domain names into IP addresses','C. Assigns IP addresses to devices automatically','D. Compresses web page data for faster loading'],answer:'B',explanation:'The Domain Name System converts human-readable domain names (like google.com) into numerical IP addresses that computers use to find each other.',memory_hook:'DNS is the internet\'s phone book — you look up a name (google.com) and it gives you the number (IP address) to call.'},
  {paper:'p1',topic:'Network Security',q:'What is a brute force attack?',options:['A. Tricking users into revealing passwords','B. Trying every possible password combination until one works','C. Intercepting data packets on a network','D. Installing hidden software to record keystrokes'],answer:'B',explanation:'A brute force attack systematically tries all possible combinations of characters until the correct password is found.',memory_hook:'Brute force is like trying every key on a giant keyring one by one until the door opens — slow but eventually it works.'},
  {paper:'p1',topic:'Network Security',q:'Which of the following best describes phishing?',options:['A. Flooding a server with requests to make it crash','B. Encrypting a victim\'s files and demanding payment','C. Sending fake emails to trick users into revealing personal information','D. Exploiting a software bug to gain unauthorised access'],answer:'C',explanation:'Phishing involves fraudulent messages (usually emails) that impersonate trusted sources to steal passwords or personal data.',memory_hook:'Phishing sounds like "fishing" — criminals cast out fake emails as bait, hoping someone takes the hook.'},
  {paper:'p1',topic:'Network Security',q:'What does encryption do to data?',options:['A. Deletes data that is no longer needed','B. Compresses data to reduce file size','C. Scrambles data so only authorised parties can read it','D. Backs up data to a remote server'],answer:'C',explanation:'Encryption converts data into a scrambled format using a key. Only someone with the correct key can decrypt and read the original data.',memory_hook:'Encryption is like writing a message in a secret code — even if someone intercepts it, it\'s gibberish without the key.'},
  {paper:'p1',topic:'Systems Software',q:'What is the main role of an operating system?',options:['A. To provide antivirus protection','B. To manage hardware resources and provide an interface for users','C. To compress files to save storage space','D. To connect the computer to the internet'],answer:'B',explanation:'The OS manages the CPU, memory, storage and input/output devices, and provides the user interface and environment for running applications.',memory_hook:'The OS is like the manager of a busy office — it decides who gets the desk, the printer, and the phone at any given time.'},
  {paper:'p1',topic:'Systems Software',q:'What does defragmentation do to a hard drive?',options:['A. Deletes temporary files to free up space','B. Scans for and removes viruses','C. Rearranges fragmented files so they are stored contiguously','D. Compresses files to reduce their size'],answer:'C',explanation:'Over time files get split into fragments across the disk. Defragmentation reorganises these so each file is stored in one continuous block, speeding up access.',memory_hook:'Defrag is like tidying a messy bookshelf — putting all chapters of the same book together so you don\'t have to hunt around.'},
  {paper:'p1',topic:'Ethical Impacts',q:'Which law in the UK protects personal data stored by organisations?',options:['A. Computer Misuse Act','B. Copyright Design and Patents Act','C. Data Protection Act','D. Freedom of Information Act'],answer:'C',explanation:'The Data Protection Act (and UK GDPR) sets rules for how organisations collect, store and use personal data, giving individuals rights over their information.',memory_hook:'Data Protection Act = your personal info has a bodyguard. Companies can\'t just do whatever they want with it.'},
  {paper:'p1',topic:'Ethical Impacts',q:'What does the Computer Misuse Act 1990 make illegal?',options:['A. Copying music without permission','B. Unauthorised access to computer systems','C. Selling personal data to third parties','D. Using social media under the age of 13'],answer:'B',explanation:'The Computer Misuse Act criminalises hacking, introducing malware, and any unauthorised access to or modification of computer systems.',memory_hook:'Computer Misuse Act = no trespassing in someone else\'s computer. Breaking in, even virtually, is a crime.'},
  {paper:'p1',topic:'Binary',q:'What is 0101 in denary?',options:['A. 3','B. 4','C. 5','D. 6'],answer:'C',explanation:'Reading from right to left the binary column values are 1, 2, 4, 8. So 0101 = 0+4+0+1 = 5.',memory_hook:'Binary columns are 8,4,2,1 from left to right — just add up the columns that have a 1. 0101 = 4+1 = 5.'},
  {paper:'p1',topic:'Binary',q:'What is 13 in binary?',options:['A. 1011','B. 1101','C. 1110','D. 1001'],answer:'B',explanation:'13 = 8+4+1, so the bits for 8, 4 and 1 are 1, giving 1101.',memory_hook:'Work right to left: does 13 need a 1? Yes (13-1=12). Does 12 need a 2? No. Does 12 need a 4? Yes (12-4=8). Does 8 need an 8? Yes. So 1101.'},
  {paper:'p2',topic:'Algorithms',q:'What does an algorithm need to be to be considered correct?',options:['A. Written in a programming language','B. Able to run on any computer','C. A clear set of steps that always produces the correct output for valid inputs','D. Stored in a flowchart'],answer:'C',explanation:'An algorithm is a precise, finite sequence of steps. It must produce the correct result for all valid inputs to be considered correct.',memory_hook:'A recipe is a great analogy — if you follow the steps exactly and get edible food every time, it\'s a correct recipe (algorithm).'},
  {paper:'p2',topic:'Algorithms',q:'Which searching algorithm works by repeatedly halving the search space?',options:['A. Linear search','B. Binary search','C. Bubble sort','D. Merge sort'],answer:'B',explanation:'Binary search works on sorted lists by checking the middle element, then eliminating the half where the target cannot be, repeating until found.',memory_hook:'Binary search is like guessing a number 1-100 — always guess the middle. "Higher" or "lower" halves your options every time.'},
  {paper:'p2',topic:'Algorithms',q:'In a bubble sort, what happens in each pass through the list?',options:['A. The list is split in half','B. Adjacent elements are compared and swapped if out of order','C. The smallest element is moved to the front','D. Elements are inserted into their correct position one at a time'],answer:'B',explanation:'Bubble sort repeatedly compares neighbouring pairs and swaps them if they are in the wrong order. Larger values bubble towards the end with each pass.',memory_hook:'Imagine bubbles rising in a fizzy drink — the biggest values rise to the top (end of list) first, one pass at a time.'},
  {paper:'p2',topic:'Algorithms',q:'What is the advantage of binary search over linear search?',options:['A. Binary search works on unsorted lists','B. Binary search is faster on large sorted lists','C. Binary search uses less memory','D. Binary search always finds the item in one step'],answer:'B',explanation:'Binary search eliminates half the remaining data each step, making it much faster than linear search which checks every item one by one on large lists.',memory_hook:'Linear search = checking every seat in a stadium. Binary search = going to the middle, then the middle of the half where your seat is.'},
  {paper:'p2',topic:'Programming Fundamentals',q:'What is the output of this Python code?\n\nx = 10\ny = 3\nprint(x % y)',options:['A. 3','B. 3.33','C. 1','D. 0'],answer:'C',explanation:'The % operator gives the remainder after division. 10 divided by 3 is 3 remainder 1, so the output is 1.',memory_hook:'% is the "leftovers" operator — 10 ÷ 3 = 3 with 1 left over. % gives you just the leftover.'},
  {paper:'p2',topic:'Programming Fundamentals',q:'Which of the following is a valid OCR ERL for loop that runs 5 times?',options:['A. for i = 1 to 5 do','B. for i = 0 to 4','C. repeat i from 0 to 5','D. loop i = 0 while i < 5'],answer:'B',explanation:'In OCR ERL, for loops use the syntax "for i = start to end" and are inclusive of both values. 0 to 4 gives exactly 5 iterations: 0,1,2,3,4.',memory_hook:'OCR ERL counts inclusively — "for i = 0 to 4" means 0,1,2,3,4 which is five numbers. Don\'t be tricked into writing "to 5"!'},
  {paper:'p2',topic:'Programming Fundamentals',q:'What is a variable?',options:['A. A fixed value that cannot change during a program','B. A named memory location that stores a value which can change','C. A block of reusable code','D. A type of loop'],answer:'B',explanation:'A variable is a named storage location in memory. The value it holds can be read and changed during program execution.',memory_hook:'A variable is like a labelled box — you give it a name, put a value inside, and you can swap out the contents whenever you like.'},
  {paper:'p2',topic:'Programming Fundamentals',q:'What does this OCR ERL code output?\n\nfor i = 1 to 3\n  print(i)\nnext i',options:['A. 1 2 3 4','B. 0 1 2 3','C. 1 2 3','D. 0 1 2'],answer:'C',explanation:'The loop runs from 1 to 3 inclusive, printing i each time, outputting 1, then 2, then 3.',memory_hook:'The loop starts at 1 and stops at 3 — it prints every number it visits, so 1, 2, 3. Simple!'},
  {paper:'p2',topic:'Programming Fundamentals',q:'What is the output of this Python?\n\nfor i in range(3):\n    print(i)',options:['A. 1 2 3','B. 0 1 2','C. 0 1 2 3','D. 1 2'],answer:'B',explanation:'range(3) in Python produces 0, 1, 2 — it starts at 0 and goes up to but NOT including 3.',memory_hook:'Python\'s range() starts at 0 and stops BEFORE the number you give it. range(3) = 0,1,2. Think of it as "up to but not touching 3".'},
  {paper:'p2',topic:'Robust Programs',q:'What is input validation?',options:['A. Checking that a program runs without errors','B. Ensuring user input meets expected criteria before processing','C. Removing bugs from code','D. Testing a program with extreme values'],answer:'B',explanation:'Input validation checks that data entered by a user is of the correct type, range, or format before the program uses it.',memory_hook:'Validation is like a bouncer at a club — it checks your credentials at the door before letting data into the program.'},
  {paper:'p2',topic:'Robust Programs',q:'What type of test data would you use to check a program correctly rejects invalid input?',options:['A. Normal data','B. Boundary data','C. Erroneous data','D. Extreme data'],answer:'C',explanation:'Erroneous data is input that is completely the wrong type or format (e.g. entering "hello" for an age field). The program should reject it gracefully.',memory_hook:'Erroneous = deliberately terrible data. You\'re trying to break it on purpose to make sure it doesn\'t break accidentally later.'},
  {paper:'p2',topic:'Robust Programs',q:'What is the purpose of a function (subroutine) in programming?',options:['A. To slow down the program for testing','B. To store data permanently','C. To group reusable code that can be called multiple times','D. To connect to external databases'],answer:'C',explanation:'Functions allow you to write a block of code once and call it whenever needed, reducing repetition and making programs easier to maintain.',memory_hook:'A function is like a vending machine — build it once, press the button (call it) whenever you need it, get a result every time.'},
  {paper:'p2',topic:'Boolean Logic',q:'What is the output of: True AND False?',options:['A. True','B. False','C. 1','D. None'],answer:'B',explanation:'AND returns True only when BOTH inputs are True. Since one input is False, the result is False.',memory_hook:'AND is strict — BOTH sides must be True. Think of a two-key safe that only opens when both keys turn simultaneously.'},
  {paper:'p2',topic:'Boolean Logic',q:'What does a NOT gate do?',options:['A. Outputs True only if both inputs are True','B. Outputs True if at least one input is True','C. Reverses the input — True becomes False and vice versa','D. Outputs True only if inputs are different'],answer:'C',explanation:'A NOT gate inverts the input. True becomes False and False becomes True.',memory_hook:'NOT is the "opposite day" gate — whatever goes in, the opposite comes out. Simple as that.'},
  {paper:'p2',topic:'Boolean Logic',q:'What is the result of: True OR False?',options:['A. True','B. False','C. Depends on context','D. Error'],answer:'A',explanation:'OR returns True if at least one input is True. Since one input is True here, the result is True.',memory_hook:'OR is generous — only ONE side needs to be True. Think of it as "either will do".'},
  {paper:'p2',topic:'Programming Languages',q:'What is the difference between a compiler and an interpreter?',options:['A. A compiler runs code line by line; an interpreter translates it all at once','B. A compiler translates the whole program before running; an interpreter translates and runs line by line','C. A compiler only works with Python; an interpreter works with all languages','D. There is no difference'],answer:'B',explanation:'A compiler translates the entire source code into machine code before execution. An interpreter translates and executes one line at a time.',memory_hook:'Compiler = translate the whole book before reading it. Interpreter = translate one sentence, read it, translate the next.'},
  {paper:'p2',topic:'Algorithms',q:'What is decomposition in computational thinking?',options:['A. Writing code in smaller functions','B. Breaking a complex problem into smaller, more manageable sub-problems','C. Removing unnecessary steps from an algorithm','D. Converting a flowchart into code'],answer:'B',explanation:'Decomposition means breaking a large problem down into smaller parts that are easier to understand, solve and code separately.',memory_hook:'Decomposition is like eating a pizza — you don\'t shove the whole thing in your mouth, you break it into slices first.'},
  {paper:'p2',topic:'Programming Fundamentals',q:'What is the correct Python syntax to get input from a user and store it?',options:['A. name = scan("Enter name")','B. name = input("Enter name")','C. name = get("Enter name")','D. input name = "Enter name"'],answer:'B',explanation:'In Python, the input() function displays a prompt and waits for the user to type something, returning it as a string.',memory_hook:'input() in Python is just like asking a question out loud — you give it the prompt text, and the user types their answer back.'},
  {paper:'p2',topic:'Robust Programs',q:'What is authentication used for in a program?',options:['A. To speed up program execution','B. To verify the identity of a user before granting access','C. To compress data for storage','D. To check code for syntax errors'],answer:'B',explanation:'Authentication verifies that a user is who they claim to be, typically through passwords, PINs, or biometrics, before granting access to a system.',memory_hook:'Authentication = proving you are who you say you are. Like showing ID at the door before you\'re let in.'}
];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
let state = {
  topic: 'both',
  session: [],
  currentIdx: 0,
  score: 0,
  streak: 0,
  firstTryCorrect: 0,
  phase: 'unanswered',
  firstWrongChoice: null
};

function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    showStart();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

document.querySelectorAll('.topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.topic = btn.dataset.topic;
  });
});

function showStart() {
  document.getElementById('quiz-area').innerHTML = `
    <div style="text-align:center;padding:2rem 0">
      <p style="font-size:15px;color:var(--text-muted);margin-bottom:0.5rem">10 questions per session from a built-in question bank.</p>
      <p style="font-size:13px;color:var(--text-hint);margin-bottom:1.5rem">One retry if you get it wrong — plus a memory hook to help it stick.</p>
      <button class="btn btn-primary" onclick="startQuiz()">Start quiz</button>
    </div>`;
}

function startQuiz() {
  const paperKey = state.topic === 'J277/01' ? 'p1' : state.topic === 'J277/02' ? 'p2' : null;
  let pool = paperKey ? ALL_Q.filter(q => q.paper === paperKey) : ALL_Q;
  state.session = shuffle(pool).slice(0, 10);
  state.currentIdx = 0;
  state.score = 0;
  state.streak = 0;
  state.firstTryCorrect = 0;
  state.phase = 'unanswered';
  state.firstWrongChoice = null;
  updateStreak();
  document.getElementById('progress-fill').style.width = '0%';
  showQuestion();
}

function updateStreak() {
  document.getElementById('streak-badge').textContent = 'Streak: ' + state.streak;
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = (state.currentIdx / state.session.length * 100) + '%';
}

function showQuestion() {
  const q = state.session[state.currentIdx];
  state.phase = 'unanswered';
  state.firstWrongChoice = null;
  updateProgress();

  const opts = q.options.map((opt, i) => {
    const l = String.fromCharCode(65 + i);
    return `<button class="option-btn" id="opt-${l}" onclick="selectAnswer('${l}')">${opt}</button>`;
  }).join('');

  document.getElementById('quiz-area').innerHTML = `
    <div class="question-card">
      <div class="q-meta">Question ${state.currentIdx + 1} of ${state.session.length} &nbsp;·&nbsp; ${q.topic}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="attempts-row" id="attempts-row">
      <span class="dot on"></span><span class="dot on"></span>
      <span class="attempts-label">2 attempts available</span>
    </div>
    <div class="options">${opts}</div>
    <div id="feedback-area"></div>
    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Next question →</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <span style="font-size:13px;color:var(--text-muted)">Score: ${state.score}/${state.currentIdx}</span>
      <button class="btn btn-secondary" style="width:auto;padding:6px 14px;font-size:13px;margin-top:0" onclick="startQuiz()">Restart</button>
    </div>`;
}

function selectAnswer(chosen) {
  const q = state.session[state.currentIdx];
  const correct = q.answer;
  const isRight = chosen === correct;

  if (state.phase === 'unanswered') {
    if (isRight) {
      state.phase = 'correct';
      state.score++; state.streak++; state.firstTryCorrect++;
      updateStreak();
      mark(chosen, 'correct'); disableAll();
      showFeedback('correct', q); showNext();
    } else {
      state.phase = 'retry';
      state.firstWrongChoice = chosen;
      mark(chosen, 'wrong-first');
      document.getElementById('opt-' + chosen).disabled = true;
      setAttempts(1);
      showFeedback('try-again', q);
    }
  } else if (state.phase === 'retry') {
    if (isRight) {
      state.phase = 'correct-retry';
      state.score++; state.streak++;
      updateStreak();
      mark(chosen, 'correct'); disableAll();
      showFeedback('correct-retry', q);
    } else {
      state.phase = 'failed';
      state.streak = 0; updateStreak();
      mark(chosen, 'wrong'); mark(correct, 'reveal'); disableAll();
      showFeedback('wrong', q);
    }
    setAttempts(2); showNext();
  }
}

function setAttempts(used) {
  const row = document.getElementById('attempts-row');
  if (!row) return;
  if (used === 1) {
    row.innerHTML = '<span class="dot off"></span><span class="dot on"></span><span class="attempts-label">1 attempt left — choose carefully!</span>';
  } else {
    row.innerHTML = '<span class="dot off"></span><span class="dot off"></span><span class="attempts-label">No attempts left</span>';
  }
}

function mark(letter, cls) {
  const btn = document.getElementById('opt-' + letter);
  if (btn) btn.classList.add(cls);
}

function disableAll() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function showFeedback(type, q) {
  const fb = document.getElementById('feedback-area');
  const hookHtml = `<div class="hook-box"><div class="hook-label">Memory hook</div>${q.memory_hook}</div>`;
  const msgs = {
    'try-again': `<div class="feedback-box try-again"><strong>Not quite — try again!</strong> One more attempt. Think it through before picking.</div>`,
    'correct': `<div class="feedback-box correct"><strong>Correct first time!</strong> ${q.explanation}</div>${hookHtml}`,
    'correct-retry': `<div class="feedback-box correct"><strong>Correct on second attempt!</strong> ${q.explanation}</div>${hookHtml}`,
    'wrong': `<div class="feedback-box wrong"><strong>The correct answer is ${q.answer}.</strong> ${q.explanation}</div>${hookHtml}`
  };
  fb.innerHTML = msgs[type] || '';
}

function showNext() {
  const btn = document.getElementById('next-btn');
  if (btn) btn.style.display = 'block';
}

function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.session.length) showScore();
  else showQuestion();
}

function showScore() {
  document.getElementById('progress-fill').style.width = '100%';
  const total = state.session.length;
  const pct = Math.round(state.score / total * 100);
  const msgs = ['Every quiz builds your knowledge. Have another go!', 'Getting there — review the memory hooks and try again.', 'Solid effort — good pass range. Keep going!', 'Excellent — you really know this material!'];
  const msg = pct >= 80 ? msgs[3] : pct >= 60 ? msgs[2] : pct >= 40 ? msgs[1] : msgs[0];

  document.getElementById('quiz-area').innerHTML = `
    <div class="score-card">
      <div style="font-size:13px;color:var(--text-hint)">Session complete</div>
      <div class="score-big">${state.score}/${total}</div>
      <div style="font-size:14px;font-weight:500">${pct}%</div>
      <div class="score-msg">${msg}</div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${state.firstTryCorrect}</div><div class="stat-lbl">First try</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#BA7517">${state.score - state.firstTryCorrect}</div><div class="stat-lbl">Second try</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red-border)">${total - state.score}</div><div class="stat-lbl">Missed</div></div>
      <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-lbl">Score</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Play again — new questions</button>
    <button class="btn btn-secondary" onclick="startQuiz()">Change topic &amp; restart</button>`;
}
</script>
</body>
</html>
