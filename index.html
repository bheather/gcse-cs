<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCSE Revision Quiz</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1D9E75; --green-light: #EAF3DE; --green-dark: #27500A; --green-border: #3B6D11;
    --red-light: #FCEBEB; --red-dark: #501313; --red-border: #A32D2D;
    --amber-light: #FAEEDA; --amber-dark: #412402; --amber-border: #854F0B;
    --gray-bg: #F5F5F3; --gray-surface: #FFFFFF; --gray-border: #E0DED8;
    --text: #1a1a1a; --text-muted: #6b6b6b; --text-hint: #9b9b9b;
    --radius: 10px; --radius-lg: 14px;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .container { width: 100%; max-width: 640px; }

  /* Password screen */
  #lock-screen { display: none; text-align: center; }
  .lock-card { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 2.5rem 2rem; }
  .lock-icon { font-size: 40px; margin-bottom: 1rem; }
  .lock-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .lock-card p { font-size: 14px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .pw-input { width: 100%; padding: 12px 16px; border: 1px solid var(--gray-border); border-radius: var(--radius); font-size: 16px; margin-bottom: 0.75rem; outline: none; }
  .pw-input:focus { border-color: var(--green); }
  .pw-error { font-size: 13px; color: var(--red-border); margin-bottom: 0.75rem; display: none; }

  /* Shared button styles */
  .btn { width: 100%; padding: 12px 16px; border-radius: var(--radius); border: none; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--gray-border); margin-top: 8px; }
  .btn-secondary:hover { background: var(--gray-bg); }

  /* Subject screen */
  #subject-screen { display: block; }
  .subject-header { text-align: center; margin-bottom: 1.5rem; }
  .subject-header h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.25rem; }
  .subject-header p { font-size: 14px; color: var(--text-muted); }
  .subject-grid { display: flex; flex-direction: column; gap: 10px; }
  .subject-card-btn { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 1rem; width: 100%; }
  .subject-card-btn:hover { border-color: var(--green); background: var(--green-light); }
  .subject-icon { font-size: 28px; line-height: 1; }
  .subject-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .subject-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Quiz shell */
  #quiz-screen { display: none; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .app-title { font-size: 16px; font-weight: 600; }
  .streak-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--gray-border); color: var(--text-muted); background: var(--gray-surface); }
  .topic-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .topic-btn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--gray-border); background: var(--gray-surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .topic-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
  .progress-bar { height: 6px; background: var(--gray-border); border-radius: 3px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }

  /* Question */
  .question-card { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .q-meta { font-size: 12px; color: var(--text-hint); margin-bottom: 0.5rem; }
  .q-text { font-size: 16px; line-height: 1.6; }
  .attempts-row { display: flex; gap: 6px; align-items: center; margin-bottom: 0.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.on { background: var(--green); }
  .dot.off { background: var(--red-border); }
  .dot.empty { background: var(--gray-border); }
  .attempts-label { font-size: 12px; color: var(--text-hint); }
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .option-btn { text-align: left; padding: 12px 16px; border-radius: var(--radius); border: 1px solid var(--gray-border); background: var(--gray-surface); color: var(--text); cursor: pointer; font-size: 15px; line-height: 1.5; transition: all 0.15s; }
  .option-btn:hover:not(:disabled) { background: var(--gray-bg); border-color: #aaa; }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct { background: var(--green-light); border-color: var(--green-border); color: var(--green-dark); }
  .option-btn.wrong { background: var(--red-light); border-color: var(--red-border); color: var(--red-dark); }
  .option-btn.wrong-first { background: var(--amber-light); border-color: var(--amber-border); color: var(--amber-dark); }
  .option-btn.reveal { background: var(--green-light); border-color: var(--green-border); color: var(--green-dark); }

  /* Feedback */
  .feedback-box { border-radius: var(--radius); padding: 12px 16px; font-size: 14px; line-height: 1.6; margin-bottom: 0.75rem; }
  .feedback-box.try-again { background: var(--amber-light); color: var(--amber-dark); border: 1px solid var(--amber-border); }
  .feedback-box.correct { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--green-border); }
  .feedback-box.wrong { background: var(--red-light); color: var(--red-dark); border: 1px solid var(--red-border); }
  .hook-box { background: var(--gray-bg); border: 1px solid var(--gray-border); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 1rem; }
  .hook-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-hint); margin-bottom: 4px; }

  /* Score screen */
  .score-card { background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius-lg); padding: 2rem; text-align: center; margin-bottom: 1rem; }
  .score-big { font-size: 52px; font-weight: 600; color: var(--green); line-height: 1; margin: 0.75rem 0; }
  .score-msg { font-size: 15px; color: var(--text-muted); margin-top: 0.5rem; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  .stat-box { flex: 1; background: var(--gray-surface); border: 1px solid var(--gray-border); border-radius: var(--radius); padding: 0.75rem; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* Loading */
  .loading { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 15px; }

  @media (max-width: 480px) {
    .score-big { font-size: 40px; }
    .lock-card { padding: 2rem 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Lock screen -->
  <div id="lock-screen">
    <div class="lock-card">
      <div class="lock-icon">📚</div>
      <h1>GCSE Revision Quiz</h1>
      <p>Enter the password to start revising</p>
      <input class="pw-input" type="password" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
      <div class="pw-error" id="pw-error">Incorrect password — try again</div>
      <button class="btn btn-primary" onclick="checkPassword()">Unlock</button>
    </div>
  </div>

  <!-- Subject screen -->
  <div id="subject-screen">
    <div class="subject-header">
      <h1>Choose a subject</h1>
      <p>Select a subject to start your revision session</p>
    </div>
    <div class="subject-grid" id="subject-grid"></div>
  </div>

  <!-- Quiz screen -->
  <div id="quiz-screen">
    <div class="top-bar">
      <span class="app-title" id="app-title">GCSE Quiz</span>
      <span class="streak-badge" id="streak-badge">Streak: 0</span>
    </div>
    <div class="topic-row" id="topic-row"></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="quiz-area"></div>
  </div>

</div>

<script src="cs.js"></script>
<script src="maths.js"></script>
<script src="dt.js"></script>
<script>
const PASSWORD_HASH = 'aca488b929c1e7b79c7342f90f01c96206f8c0ce832626e863afc03c42c8f03e';

async function hashString(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

const SUBJECTS = {
  cs: {
    label: 'Computer Science',
    subtitle: 'OCR GCSE J277',
    icon: '💻',
    questions: CS_Q,
    filters: [
      { label: 'All topics', value: null },
      { label: 'Paper 1 — Systems', value: 'p1' },
      { label: 'Paper 2 — Programming', value: 'p2' }
    ]
  },
  maths: {
    label: 'Mathematics',
    subtitle: 'OCR GCSE J560',
    icon: '📐',
    questions: MATHS_Q,
    filters: [
      { label: 'All topics', value: null },
      { label: 'Number', value: 'number' },
      { label: 'Algebra', value: 'algebra' },
      { label: 'Geometry', value: 'geometry' },
      { label: 'Statistics', value: 'statistics' }
    ]
  },
  dt: {
    label: 'Design & Technology',
    subtitle: 'OCR GCSE J310',
    icon: '🔧',
    questions: DT_Q,
    filters: [
      { label: 'All topics', value: null },
      { label: 'Materials', value: 'materials' },
      { label: 'Design Process', value: 'design' },
      { label: 'Manufacturing', value: 'manufacturing' },
      { label: 'Electronics', value: 'electronics' }
    ]
  }
};

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

let state = {
  subject: null,
  topic: null,
  session: [],
  currentIdx: 0,
  score: 0,
  streak: 0,
  firstTryCorrect: 0,
  phase: 'unanswered',
  firstWrongChoice: null
};

function showScreen(id) {
  ['lock-screen', 'subject-screen', 'quiz-screen'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}

async function checkPassword() {
  const val = document.getElementById('pw-input').value;
  if (await hashString(val) === PASSWORD_HASH) {
    showScreen('subject-screen');
    renderSubjectGrid();
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function renderSubjectGrid() {
  document.getElementById('subject-grid').innerHTML = Object.entries(SUBJECTS).map(([key, sub]) => `
    <button class="subject-card-btn" onclick="selectSubject('${key}')">
      <span class="subject-icon">${sub.icon}</span>
      <div>
        <div class="subject-name">${sub.label}</div>
        <div class="subject-sub">${sub.subtitle} &nbsp;·&nbsp; ${sub.questions.length} questions</div>
      </div>
    </button>`).join('');
}

function selectSubject(key) {
  state.subject = key;
  state.topic = null;
  const sub = SUBJECTS[key];
  document.getElementById('app-title').textContent = sub.label;
  renderTopicFilters();
  showScreen('quiz-screen');
  showStart();
}

function renderTopicFilters() {
  const sub = SUBJECTS[state.subject];
  document.getElementById('topic-row').innerHTML = sub.filters.map(f => `
    <button class="topic-btn ${f.value === state.topic ? 'active' : ''}" onclick="setTopic(${JSON.stringify(f.value)})">${f.label}</button>
  `).join('');
}

function setTopic(value) {
  state.topic = value;
  renderTopicFilters();
}

function showStart() {
  const sub = SUBJECTS[state.subject];
  document.getElementById('quiz-area').innerHTML = `
    <div style="text-align:center;padding:2rem 0">
      <p style="font-size:15px;color:var(--text-muted);margin-bottom:0.5rem">10 questions per session from ${sub.questions.length} in the question bank.</p>
      <p style="font-size:13px;color:var(--text-hint);margin-bottom:1.5rem">One retry if you get it wrong — plus a memory hook to help it stick.</p>
      <button class="btn btn-primary" onclick="startQuiz()">Start quiz</button>
      <button class="btn btn-secondary" onclick="showScreen('subject-screen')">Change subject</button>
    </div>`;
}

function startQuiz() {
  const sub = SUBJECTS[state.subject];
  let pool = state.topic ? sub.questions.filter(q => q.paper === state.topic) : sub.questions;
  state.session = shuffle(pool).slice(0, 10);
  state.currentIdx = 0;
  state.score = 0;
  state.streak = 0;
  state.firstTryCorrect = 0;
  state.phase = 'unanswered';
  state.firstWrongChoice = null;
  updateStreak();
  document.getElementById('progress-fill').style.width = '0%';
  showQuestion();
}

function updateStreak() {
  document.getElementById('streak-badge').textContent = 'Streak: ' + state.streak;
}

function updateProgress() {
  document.getElementById('progress-fill').style.width = (state.currentIdx / state.session.length * 100) + '%';
}

function showQuestion() {
  const q = state.session[state.currentIdx];
  state.phase = 'unanswered';
  state.firstWrongChoice = null;
  updateProgress();

  const opts = q.options.map((opt, i) => {
    const l = String.fromCharCode(65 + i);
    return `<button class="option-btn" id="opt-${l}" onclick="selectAnswer('${l}')">${opt}</button>`;
  }).join('');

  document.getElementById('quiz-area').innerHTML = `
    <div class="question-card">
      <div class="q-meta">Question ${state.currentIdx + 1} of ${state.session.length} &nbsp;·&nbsp; ${q.topic}</div>
      <div class="q-text">${q.q}</div>
    </div>
    <div class="attempts-row" id="attempts-row">
      <span class="dot on"></span><span class="dot on"></span>
      <span class="attempts-label">2 attempts available</span>
    </div>
    <div class="options">${opts}</div>
    <div id="feedback-area"></div>
    <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none">Next question →</button>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <span style="font-size:13px;color:var(--text-muted)">Score: ${state.score}/${state.currentIdx}</span>
      <button class="btn btn-secondary" style="width:auto;padding:6px 14px;font-size:13px;margin-top:0" onclick="startQuiz()">Restart</button>
    </div>`;
}

function selectAnswer(chosen) {
  const q = state.session[state.currentIdx];
  const correct = q.answer;
  const isRight = chosen === correct;

  if (state.phase === 'unanswered') {
    if (isRight) {
      state.phase = 'correct';
      state.score++; state.streak++; state.firstTryCorrect++;
      updateStreak();
      mark(chosen, 'correct'); disableAll();
      showFeedback('correct', q); showNext();
    } else {
      state.phase = 'retry';
      state.firstWrongChoice = chosen;
      mark(chosen, 'wrong-first');
      document.getElementById('opt-' + chosen).disabled = true;
      setAttempts(1);
      showFeedback('try-again', q);
    }
  } else if (state.phase === 'retry') {
    if (isRight) {
      state.phase = 'correct-retry';
      state.score++; state.streak++;
      updateStreak();
      mark(chosen, 'correct'); disableAll();
      showFeedback('correct-retry', q);
    } else {
      state.phase = 'failed';
      state.streak = 0; updateStreak();
      mark(chosen, 'wrong'); mark(correct, 'reveal'); disableAll();
      showFeedback('wrong', q);
    }
    setAttempts(2); showNext();
  }
}

function setAttempts(used) {
  const row = document.getElementById('attempts-row');
  if (!row) return;
  if (used === 1) {
    row.innerHTML = '<span class="dot off"></span><span class="dot on"></span><span class="attempts-label">1 attempt left — choose carefully!</span>';
  } else {
    row.innerHTML = '<span class="dot off"></span><span class="dot off"></span><span class="attempts-label">No attempts left</span>';
  }
}

function mark(letter, cls) {
  const btn = document.getElementById('opt-' + letter);
  if (btn) btn.classList.add(cls);
}

function disableAll() {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
}

function showFeedback(type, q) {
  const fb = document.getElementById('feedback-area');
  const hookHtml = `<div class="hook-box"><div class="hook-label">Memory hook</div>${q.memory_hook}</div>`;
  const msgs = {
    'try-again': `<div class="feedback-box try-again"><strong>Not quite — try again!</strong> One more attempt. Think it through before picking.</div>`,
    'correct': `<div class="feedback-box correct"><strong>Correct first time!</strong> ${q.explanation}</div>${hookHtml}`,
    'correct-retry': `<div class="feedback-box correct"><strong>Correct on second attempt!</strong> ${q.explanation}</div>${hookHtml}`,
    'wrong': `<div class="feedback-box wrong"><strong>The correct answer is ${q.answer}.</strong> ${q.explanation}</div>${hookHtml}`
  };
  fb.innerHTML = msgs[type] || '';
}

function showNext() {
  const btn = document.getElementById('next-btn');
  if (btn) btn.style.display = 'block';
}

function nextQuestion() {
  state.currentIdx++;
  if (state.currentIdx >= state.session.length) showScore();
  else showQuestion();
}

function showScore() {
  document.getElementById('progress-fill').style.width = '100%';
  const total = state.session.length;
  const pct = Math.round(state.score / total * 100);
  const msgs = ['Every quiz builds your knowledge. Have another go!', 'Getting there — review the memory hooks and try again.', 'Solid effort — good pass range. Keep going!', 'Excellent — you really know this material!'];
  const msg = pct >= 80 ? msgs[3] : pct >= 60 ? msgs[2] : pct >= 40 ? msgs[1] : msgs[0];

  document.getElementById('quiz-area').innerHTML = `
    <div class="score-card">
      <div style="font-size:13px;color:var(--text-hint)">Session complete</div>
      <div class="score-big">${state.score}/${total}</div>
      <div style="font-size:14px;font-weight:500">${pct}%</div>
      <div class="score-msg">${msg}</div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${state.firstTryCorrect}</div><div class="stat-lbl">First try</div></div>
      <div class="stat-box"><div class="stat-num" style="color:#BA7517">${state.score - state.firstTryCorrect}</div><div class="stat-lbl">Second try</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red-border)">${total - state.score}</div><div class="stat-lbl">Missed</div></div>
      <div class="stat-box"><div class="stat-num">${pct}%</div><div class="stat-lbl">Score</div></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Play again — new questions</button>
    <button class="btn btn-secondary" onclick="showScreen('subject-screen')">Change subject</button>`;
}

renderSubjectGrid();
</script>
</body>
</html>
